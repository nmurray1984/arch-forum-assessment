app = "architect-assessment"
primary_region = "iad"

[build]
  builder = "heroku/builder:22"

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/health"

[mounts]
  source = "assessment_data"
  destination = "/data"
