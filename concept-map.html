<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect Concept Map — "Unlocks" Framing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F7F8FC;
    font-family: 'Inter', system-ui, sans-serif;
    color: #1C2C80;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .page { width: 1100px; max-width: 100%; }
  .thesis { text-align: center; margin-bottom: 28px; }
  .thesis h1 {
    font-size: 21px; font-weight: 700; color: #010F31;
    line-height: 1.45; margin-bottom: 8px;
  }
  .thesis .subtitle {
    font-size: 12.5px; font-weight: 400; color: #1A57D6;
    letter-spacing: 0.04em;
  }
  .close { text-align: center; margin-top: 28px; }
  .close p { font-size: 15px; font-weight: 600; color: #010F31; font-style: italic; }
  .graph-container { display: flex; justify-content: center; }
  svg text { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
<div class="page">

  <div class="thesis">
    <h1>"Each breakthrough in information technology<br>unlocks possibilities that call the next into being."</h1>
    <div class="subtitle">compute · express · interact · remember · connect · trust · learn · sustain</div>
  </div>

  <div class="graph-container">
    <svg width="1060" height="1280" viewBox="0 0 1060 1280">
      <defs>
        <marker id="ab" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#1A57D6"/></marker>
        <marker id="an" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#1C2C80"/></marker>
        <marker id="ad" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#010F31"/></marker>
        <marker id="ac" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#F95353"/></marker>
      </defs>

      <!-- ====== TIER BANDS ====== -->
      <!-- Capability: y=470 to bottom -->
      <rect x="0" y="530" width="1060" height="750" rx="10" fill="#EBE9F5" opacity="0.18"/>
      <!-- Realization: y=220 to y=530 -->
      <rect x="0" y="240" width="1060" height="290" rx="10" fill="#EBE9F5" opacity="0.3"/>
      <!-- Direction: y=0 to y=220 -->
      <rect x="0" y="0" width="1060" height="235" rx="10" fill="#EBE9F5" opacity="0.45"/>

      <!-- Tier labels -->
      <text x="30" y="560" font-size="11" font-weight="700" fill="#1A57D6" letter-spacing="0.1em">CAPABILITY</text>
      <text x="30" y="574" font-size="9.5" fill="#1A57D6" opacity="0.7">What technology can do</text>
      <text x="30" y="270" font-size="11" font-weight="700" fill="#1C2C80" letter-spacing="0.1em">REALIZATION</text>
      <text x="30" y="284" font-size="9.5" fill="#1C2C80" opacity="0.7">Making it real at scale</text>
      <text x="30" y="27"  font-size="11" font-weight="700" fill="#010F31" letter-spacing="0.1em">DIRECTION</text>
      <text x="30" y="41"  font-size="9.5" fill="#010F31" opacity="0.7">What makes it matter</text>


      <!-- ================================ -->
      <!--  CAPABILITY: Linear chain        -->
      <!-- ================================ -->

      <!-- Computation  y=1220 -->
      <rect x="410" y="1220" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="530" y="1238" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Computation</text>
      <text x="530" y="1253" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">What's computable — and what isn't</text>

      <!-- Computation → Hardware -->
      <line x1="530" y1="1220" x2="530" y2="1184" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <text x="540" y="1206" font-size="8.5" fill="#1A57D6" font-style="italic">unlocks: building machines that compute</text>

      <!-- Hardware  y=1140 -->
      <rect x="410" y="1140" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="530" y="1158" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Hardware</text>
      <text x="530" y="1173" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Making computation physical</text>

      <!-- Hardware → Software -->
      <line x1="530" y1="1140" x2="530" y2="1104" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <text x="540" y="1126" font-size="8.5" fill="#1A57D6" font-style="italic">unlocks: telling machines what to do</text>

      <!-- Software  y=1060 -->
      <rect x="410" y="1060" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="530" y="1078" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Software</text>
      <text x="530" y="1093" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Expressing intent for machines to execute</text>


      <!-- ============================================ -->
      <!--  FIRST FAN-OUT: Software → HCI, Data, Net   -->
      <!-- ============================================ -->

      <!-- Stem up from Software -->
      <line x1="530" y1="1060" x2="530" y2="1030" stroke="#1A57D6" stroke-width="1.5"/>
      <text x="530" y="1046" text-anchor="middle" font-size="8.5" fill="#1A57D6" font-style="italic">software that works unlocks three frontiers</text>

      <!-- H-bar for 3-way fork -->
      <line x1="210" y1="1030" x2="850" y2="1030" stroke="#1A57D6" stroke-width="1.5"/>

      <!-- Drop to HCI (left) -->
      <line x1="210" y1="1030" x2="210" y2="1000" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <!-- Drop to Data (center) -->
      <line x1="530" y1="1030" x2="530" y2="1000" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <!-- Drop to Networking (right) -->
      <line x1="850" y1="1030" x2="850" y2="1000" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>

      <!-- HCI  y=956 -->
      <rect x="90" y="956" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="210" y="974" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">HCI</text>
      <text x="210" y="989" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Making capability accessible to humans</text>

      <!-- Data  y=956 -->
      <rect x="410" y="956" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="530" y="974" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Data</text>
      <text x="530" y="989" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Preserving facts beyond the moment</text>

      <!-- Networking  y=956 -->
      <rect x="730" y="956" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="850" y="974" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Networking</text>
      <text x="850" y="989" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Making geography irrelevant</text>


      <!-- ============================================ -->
      <!--  SECOND FAN: HCI→Ops, Data→AI, Net→Security -->
      <!-- ============================================ -->

      <!-- HCI → Operations -->
      <line x1="210" y1="956" x2="210" y2="896" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <text x="100" y="930" font-size="8.5" fill="#1A57D6" font-style="italic">unlocks: real users need</text>
      <text x="100" y="941" font-size="8.5" fill="#1A57D6" font-style="italic">systems that stay running</text>

      <!-- Operations  y=852 -->
      <rect x="90" y="852" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="210" y="870" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Operations</text>
      <text x="210" y="885" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Sustaining systems beyond their creation</text>

      <!-- Data → AI -->
      <line x1="530" y1="956" x2="530" y2="896" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <text x="540" y="930" font-size="8.5" fill="#1A57D6" font-style="italic">unlocks: learning patterns</text>
      <text x="540" y="941" font-size="8.5" fill="#1A57D6" font-style="italic">from accumulated data</text>

      <!-- AI  y=852 -->
      <rect x="410" y="852" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="530" y="870" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AI</text>
      <text x="530" y="885" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Learning patterns we can't specify</text>

      <!-- Networking → Security -->
      <line x1="850" y1="956" x2="850" y2="896" stroke="#1A57D6" stroke-width="1.5" marker-end="url(#ab)"/>
      <text x="860" y="930" font-size="8.5" fill="#1A57D6" font-style="italic">unlocks: doing real work</text>
      <text x="860" y="941" font-size="8.5" fill="#1A57D6" font-style="italic">across open channels</text>

      <!-- Security  y=852 -->
      <rect x="730" y="852" width="240" height="44" rx="7" fill="#1A57D6"/>
      <text x="850" y="870" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Security</text>
      <text x="850" y="885" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Trust without proximity</text>


      <!-- ============================================== -->
      <!--  CAPABILITY SUMMARY — merge bar               -->
      <!-- ============================================== -->

      <!-- Three verticals down to merge bar -->
      <line x1="210" y1="852" x2="210" y2="810" stroke="#1A57D6" stroke-width="1.5"/>
      <line x1="530" y1="852" x2="530" y2="810" stroke="#1A57D6" stroke-width="1.5"/>
      <line x1="850" y1="852" x2="850" y2="810" stroke="#1A57D6" stroke-width="1.5"/>
      <!-- H-bar merge -->
      <line x1="210" y1="810" x2="850" y2="810" stroke="#1A57D6" stroke-width="1.5"/>

      <!-- Capability summary label -->
      <text x="530" y="800" text-anchor="middle" font-size="9" fill="#1A57D6" font-style="italic">we can compute, express, interact, remember, connect, trust, learn, and sustain</text>

      <!-- Dotted cross-tier transition -->
      <line x1="530" y1="810" x2="530" y2="770" stroke="#1A57D6" stroke-width="1.5"/>

      <!-- Capability → Realization label box -->
      <rect x="370" y="746" width="320" height="30" rx="5" fill="none" stroke="#1C2C80" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="530" y="765" text-anchor="middle" font-size="9" font-weight="500" fill="#1C2C80">unlocks the ambition to build things too complex for any one person</text>

      <line x1="530" y1="746" x2="530" y2="716" stroke="#1C2C80" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#an)"/>


      <!-- ================================ -->
      <!--  REALIZATION TIER               -->
      <!-- ================================ -->

      <!-- Delivery  y=672 -->
      <rect x="410" y="672" width="240" height="44" rx="7" fill="#1C2C80"/>
      <text x="530" y="690" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Delivery</text>
      <text x="530" y="705" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Organizing people to build</text>

      <!-- Delivery → Integration -->
      <line x1="530" y1="672" x2="530" y2="636" stroke="#1C2C80" stroke-width="1.5" marker-end="url(#an)"/>
      <text x="540" y="658" font-size="8.5" fill="#1C2C80" font-style="italic">unlocks: teams building separate parts</text>

      <!-- Integration  y=592 -->
      <rect x="410" y="592" width="240" height="44" rx="7" fill="#1C2C80"/>
      <text x="530" y="610" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Integration</text>
      <text x="530" y="625" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Making parts cooperate across boundaries</text>

      <!-- Integration → Evolution -->
      <line x1="530" y1="592" x2="530" y2="556" stroke="#1C2C80" stroke-width="1.5" marker-end="url(#an)"/>
      <text x="540" y="578" font-size="8.5" fill="#1C2C80" font-style="italic">unlocks: systems that outlive their creators</text>

      <!-- Evolution  y=512 -->
      <rect x="410" y="512" width="240" height="44" rx="7" fill="#1C2C80"/>
      <text x="530" y="530" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Evolution</text>
      <text x="530" y="545" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Changing what no longer fits</text>


      <!-- ================================ -->
      <!--  CROSS-TIER: Real → Dir         -->
      <!-- ================================ -->
      <rect x="370" y="468" width="320" height="30" rx="5" fill="none" stroke="#010F31" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="530" y="487" text-anchor="middle" font-size="9" font-weight="500" fill="#010F31">unlocks the hardest question: what's worth building?</text>

      <line x1="530" y1="512" x2="530" y2="498" stroke="#1C2C80" stroke-width="1.5"/>
      <line x1="530" y1="468" x2="530" y2="440" stroke="#010F31" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ad)"/>


      <!-- ================================ -->
      <!--  DIRECTION — TRIAD              -->
      <!-- ================================ -->
      <text x="530" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="#010F31" letter-spacing="0.06em">THE DISCIPLINE OF CHOOSING WELL</text>

      <!-- Triad lines (behind boxes) -->
      <line x1="530" y1="88" x2="340" y2="170" stroke="#F95353" stroke-width="1.3" stroke-dasharray="4 3"/>
      <line x1="530" y1="88" x2="720" y2="170" stroke="#F95353" stroke-width="1.3" stroke-dasharray="4 3"/>
      <line x1="340" y1="180" x2="720" y2="180" stroke="#F95353" stroke-width="1.3" stroke-dasharray="4 3"/>

      <!-- "Without" labels on triad edges -->
      <text x="415" y="124" font-size="7.5" fill="#F95353" font-style="italic">without: wrong thing</text>
      <text x="625" y="124" font-size="7.5" fill="#F95353" font-style="italic">without: can't evolve</text>
      <text x="530" y="195" text-anchor="middle" font-size="7.5" fill="#F95353" font-style="italic">without: no one follows</text>

      <!-- Alignment (top vertex, coral) -->
      <rect x="460" y="50" width="140" height="42" rx="7" fill="#F95353"/>
      <text x="530" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Alignment</text>
      <text x="530" y="83" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">What and why?</text>

      <!-- Structure (bottom-left vertex) -->
      <rect x="260" y="150" width="160" height="42" rx="7" fill="#010F31"/>
      <text x="340" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Structure</text>
      <text x="340" y="183" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">How, so it lasts?</text>

      <!-- Influence (bottom-right vertex) -->
      <rect x="640" y="150" width="160" height="42" rx="7" fill="#010F31"/>
      <text x="720" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Influence</text>
      <text x="720" y="183" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">How do we make it happen?</text>

      <!-- Arrow from triad down to Evolution (connecting Direction back to rest) -->
      <line x1="530" y1="398" x2="530" y2="440" stroke="#010F31" stroke-width="0" />

    </svg>
  </div>

  <div class="close">
    <p>"An architect's job is to see what's been unlocked — and what it makes possible next."</p>
  </div>

</div>
</body>
</html>
